<article class="project-card">
  <div class="project-image">
    <img src="{{ mini_project.thumbnail | relative_url }}" alt="{{ mini_project.alt }}" width="960" height="600" loading="lazy">
  </div>
  <div class="project-copy">
    <div class="project-meta">
      <span>{{ mini_project.type }}</span>
      <span>{{ mini_project.time }}</span>
    </div>
    <h3>{{ mini_project.title }}</h3>
    <p>{{ mini_project.description }}</p>
  </div>
</article>
