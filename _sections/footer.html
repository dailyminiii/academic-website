<footer class="site-footer">
  <div class="shell footer-main">
    <div>
      <span class="footer-mark" aria-hidden="true">✦</span>
      <strong>{{ site.data.about.name }}</strong>
      <p>{{ site.data.about.role }} at GIST</p>
    </div>
    <div class="footer-links" aria-label="External profiles">
      <a href="{{ site.data.about.cv }}" target="_blank" rel="noopener">CV</a>
      <a href="{{ site.data.about.scholar }}" target="_blank" rel="noopener">Scholar</a>
      <a href="{{ site.data.about.github }}" target="_blank" rel="noopener">GitHub</a>
      <a href="{{ site.data.about.orcid }}" target="_blank" rel="noopener">ORCID</a>
      <a href="mailto:{{ site.data.about.email }}">Email</a>
    </div>
  </div>
  <div class="shell footer-bottom">
    <p>© <span id="current-year"></span> {{ site.title }}</p>
    <p>Built with Jekyll · Gwangju, South Korea</p>
  </div>
</footer>
