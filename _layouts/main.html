<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f5f7f3">
    <meta name="description" content="{{ site.description }}">
    <meta name="author" content="{{ site.title }}">
    <meta property="og:title" content="{{ site.title }} | {{ site.info }}">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <title>{{ site.title }} | {{ site.info }}</title>
    <link rel="canonical" href="{{ site.url }}{{ page.url }}">
    <link rel="icon" type="image/png" href="{{ site.icon-pic | relative_url }}">
    <link rel="stylesheet" href="{{ '/styles/styles.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="#about" aria-label="Minwoo Seong, home">
          <span class="brand-mark" aria-hidden="true">MS</span>
          <span class="brand-copy">
            <strong>{{ site.title }}</strong>
            <small>{{ site.info }}</small>
          </span>
        </a>

        <nav class="desktop-nav" aria-label="Primary navigation">
          <a href="#about">About</a>
          <a href="#research">Research</a>
          <a href="#publications">Publications</a>
          <a href="#projects">Projects</a>
          <a class="nav-cta" href="#contact">Contact</a>
        </nav>

        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="mobile-navigation">
          <span class="sr-only">Open navigation</span>
          <span></span><span></span><span></span>
        </button>
      </div>

      <nav class="mobile-nav" id="mobile-navigation" aria-label="Mobile navigation" hidden>
        <a href="#about">About</a>
        <a href="#research">Research</a>
        <a href="#publications">Publications</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <main id="main-content">
      {{ content }}
    </main>

    <script src="{{ '/js/scripts.js' | relative_url }}" defer></script>
  </body>
</html>
