research_areas:
  - label: SportsHCI
    title: AI-guided motor learning
    description: I use motion and muscle sensing to understand physical skills and generate feedback that helps people learn more effectively.
  - label: Accessibility
    title: Inclusive adaptive interaction
    description: I design interpretable sensing and intervention systems that support engagement and participation for children with autism.
  - label: Mobility
    title: Human-vehicle interaction
    description: I explore context-aware interfaces, passenger sensing, and XR experiences for safer and more comfortable automated mobility.

