intro: I build human-centered intelligent systems that understand physical behavior and provide timely, personalized feedback.
summary: My research sits at the intersection of human-computer interaction, wearable sensing, and artificial intelligence. I study adaptive interaction for motor learning, accessibility, and human-vehicle experiences.

