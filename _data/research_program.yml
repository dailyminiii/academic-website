hero:
  headline: Human–AI Skill Learning through Multimodal Sensing and Embodied Intelligence
  paragraphs:
    - I study how physical skills can be captured from human demonstrations, represented computationally, and transformed into adaptive policies that support human learning or embodied robot learning. My work combines multimodal sensing, XR/MR, and human–AI interaction to understand movement, intention, performance, and learning state.
    - Racket sports serve as my primary testbed, spanning multimodal datasets, personalized AI coaching, practice-partner authoring, and human-to-robot skill transfer.
    - My long-term goal is to build an integrated research program that connects physical-skill data collection, computational representation, policy learning, and deployment for both human and robot education.
    - My broader collaborative work applies the same sensing-and-adaptation perspective to accessibility, mobility, and immersive interaction.

