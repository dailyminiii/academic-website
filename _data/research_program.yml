hero:
  headline: Human–AI Skill Learning through Multimodal Sensing and Embodied Intelligence
  paragraphs:
    - I study how physical skills can be captured from human demonstrations, represented computationally, and transformed into adaptive feedback for human learning. My work combines multimodal sensing, XR/MR, and human–AI interaction to understand movement, performance, and learning state.
    - Racket sports serve as my primary testbed, spanning multimodal datasets, performance modeling, and adaptive motion guidance.
    - My long-term goal is to connect physical-skill data collection, computational representation, and interactive feedback in systems that help people learn complex motor skills.
    - My broader collaborative work applies the same sensing-and-adaptation perspective to accessibility, mobility, and immersive interaction.
